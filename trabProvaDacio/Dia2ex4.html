<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo </title>
    <link href="css/bootstrap.css" rel="stylesheet">

    <style> 
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg-copa {
            background-image: url('img/FIFA-World-Cup-26');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

    <div class="bg-copa">

        <div class="d-flex flex-column justify-content-center align-items-center">

            <!-- CONTAINER DOS CARDS -->
            <div id="Cards" class="d-flex flex-row align-items-center gap-3">

                <!-- CARD 1 -->
                <div class="card" style="width: 22rem;">
                    <img src="_vinicius_junior.png" class="card-img-top" alt="Vini Jr">

                    <div class="card-body">
                        <h5 class="card-title">
                            Vini JR.
                            <span class="badge text-bg-secondary">9,5</span>
                        </h5>

                        <p class="card-text">
                            <strong>Nascimento:</strong> 12/07/2000 <br>
                            <strong>Altura:</strong> 1,76 <br>
                            <strong>Posição:</strong> Ponta-esquerda / Atacante
                        </p>
                    </div>
                </div>

            </div>

            <!-- BOTÃO -->
            <a href="#" onclick="add()" class="btn btn-primary mt-3">
                Adicionar Novo Jogador
            </a>

        </div>
    </div>

    <script src="js/bootstrap.js"></script>

    <!-- ✅ QUESTÃO 04 (JS) -->
    <script>
        function add() {

            const container = document.getElementById("Cards");

            const novoCard = document.createElement("div");
            novoCard.className = "card";
            novoCard.style.width = "22rem";

            novoCard.innerHTML = `
                <img src="Lucas_Paqueta.webp" class="card-img-top" alt="Lucas Paquetá">

                <div class="card-body">
                    <h5 class="card-title">
                        Lucas Paquetá
                        <span class="badge text-bg-secondary">8,8</span>
                    </h5>

                    <p class="card-text">
                        <strong>Nome:</strong> Lucas Tolentino Coelho de Lima <br>
                        <strong>Nascimento:</strong> 27/08/1997 <br>
                        <strong>Altura:</strong> 1,80 m <br>
                        <strong>Posição:</strong> Meio-campista
                    </p>
                </div>
            `;

            container.appendChild(novoCard);
        }
    </script>

</body>
</html>
